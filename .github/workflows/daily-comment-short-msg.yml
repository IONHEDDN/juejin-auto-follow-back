name: 每日沸点评论（大号，前5条每条间隔1分钟）

on:
  schedule:
    # 每天早上 9:30 北京时间 = 1:30 UTC
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 执行沸点评论（前5条，每条间隔1分钟）
        run: python scripts/daily_comment_short_msg.py
        env:
          PYTHONUNBUFFERED: '1'
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
