name: 每日沸点点赞（大号）

on:
  schedule:
    # 每天早上 8:00 北京时间 = 0:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  digg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 执行每日沸点点赞（大号前 3 条）
        run: python scripts/daily_digg_short_msg.py
        env:
          PYTHONUNBUFFERED: '1'
          JUEJIN_COOKIES: ${{ secrets.JUEJIN_COOKIES }}
